@if (Enabled) {
<div>
    <div class="message-bar" [ngStyle]="{'background-color': BannerBackgroundColor}">
        <div [ngStyle]="{'color': ClassificationTextColor, 'font-size': ClassificationTextFontSize}">{{ ClassificationText }}</div>
        <div [ngStyle]="{'color': MessageTextColor, 'font-size': MessageTextFontSize}">{{ MessageText }}</div>
    </div>
</div>
}
